name: Release cfassist

on:
  push:
    tags:
      - 'cfassist-v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: linux
            goarch: arm
            goarm: "7"
            suffix: linux-arm
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: cfassist-go/go.mod

      - name: Build
        working-directory: cfassist-go
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
        run: |
          VERSION="${GITHUB_REF_NAME#cfassist-v}"
          LDFLAGS="-s -w -X github.com/aachtenberg/cfoperator/cfassist-go/internal/config.Version=${VERSION}"
          go build -ldflags "${LDFLAGS}" -o cfassist-${{ matrix.suffix }} ./cmd/cfassist

      - uses: actions/upload-artifact@v4
        with:
          name: cfassist-${{ matrix.suffix }}
          path: cfassist-go/cfassist-${{ matrix.suffix }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create checksums
        working-directory: artifacts
        run: sha256sum cfassist-* > checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "cfassist ${{ github.ref_name }}"
          generate_release_notes: true
          files: |
            artifacts/cfassist-*
            artifacts/checksums.txt
