apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-gateway
  namespace: ai
  labels:
    app: llm-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: llm-gateway
  template:
    metadata:
      labels:
        app: llm-gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "4000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: llm-gateway
          image: ghcr.io/aachtenberg/llm-gateway:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 4000
          env:
            - name: CONFIG_PATH
              value: /config/config.yaml
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-gateway-secrets
                  key: groq-api-key
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-gateway-secrets
                  key: anthropic-api-key
          volumeMounts:
            - name: config
              mountPath: /config
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: config
          configMap:
            name: llm-gateway-config
---
apiVersion: v1
kind: Service
metadata:
  name: llm-gateway
  namespace: ai
  labels:
    app: llm-gateway
spec:
  selector:
    app: llm-gateway
  ports:
    - name: http
      port: 4000
      targetPort: http
  type: ClusterIP
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: llm-gateway-config
  namespace: ai
data:
  config.yaml: |
    listen: ":4000"
    
    backends:
      - name: ollama-llm01
        provider: ollama
        url: http://10.0.0.5:11434
        model: qwen3:14b
        enabled: true
        priority: 1
    
      - name: ollama-gaming1
        provider: ollama
        url: http://10.0.0.6:11434
        model: qwen3:14b
        enabled: true
        priority: 2
    
      - name: ollama-gaming2
        provider: ollama
        url: http://10.0.0.7:11434
        model: qwen3:14b
        enabled: true
        priority: 3
    
      - name: groq
        provider: openai
        url: https://api.groq.com
        model: llama-3.3-70b-versatile
        api_key: ${GROQ_API_KEY}
        enabled: true
        priority: 10
    
      - name: anthropic
        provider: anthropic
        url: https://api.anthropic.com
        model: claude-sonnet-4-20250514
        api_key: ${ANTHROPIC_API_KEY}
        enabled: true
        priority: 11
    
    fallback:
      - ollama-llm01
      - ollama-gaming1
      - ollama-gaming2
      - groq
      - anthropic
