version: '3.8'

services:
  cfoperator:
    build: .
    container_name: cfoperator
    ports:
      - "8083:8083"  # HTTP/WebSocket
    environment:
      # Database connection
      - POSTGRES_HOST=${POSTGRES_HOST:-postgres}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_DB=${POSTGRES_DB:-cfoperator}
      - POSTGRES_USER=${POSTGRES_USER:-cfoperator}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}

      # LLM API keys
      - OLLAMA_URL=${OLLAMA_URL:-http://192.168.0.198:11434}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}

      # Observability backends
      - PROMETHEUS_URL=${PROMETHEUS_URL:-http://prometheus:9090}
      - LOKI_URL=${LOKI_URL:-http://loki:3100}
      - ALERTMANAGER_URL=${ALERTMANAGER_URL:-http://alertmanager:9093}

      # Notifications
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}

      # Config
      - CONFIG_PATH=/app/config.yaml
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./skills:/app/skills:ro
      - /var/run/docker.sock:/var/run/docker.sock  # Docker access
    restart: unless-stopped
    networks:
      - monitoring

  # PostgreSQL (optional - can use existing database)
  postgres:
    image: pgvector/pgvector:pg16
    container_name: cfoperator-postgres
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-cfoperator}
      - POSTGRES_USER=${POSTGRES_USER:-cfoperator}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - monitoring

networks:
  monitoring:
    external: true  # Assumes you have a monitoring network already

volumes:
  postgres_data:
