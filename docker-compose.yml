version: '3.8'

services:
  cfoperator:
    build: .
    container_name: cfoperator
    ports:
      - "8083:8083"  # HTTP/WebSocket
    environment:
      # Database connection
      - POSTGRES_HOST=${POSTGRES_HOST:-localhost}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_DB=${POSTGRES_DB:-cfoperator}
      - POSTGRES_USER=${POSTGRES_USER:-cfoperator}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}

      # LLM API keys
      - OLLAMA_URL=${OLLAMA_URL:-http://localhost:11434}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}

      # Observability backends
      - PROMETHEUS_URL=${PROMETHEUS_URL:-http://localhost:9090}
      - LOKI_URL=${LOKI_URL:-http://localhost:3100}
      - ALERTMANAGER_URL=${ALERTMANAGER_URL:-http://localhost:9093}

      # Notifications
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}

      # Config
      - CONFIG_PATH=/app/config.yaml
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./skills:/app/skills:ro
      - /var/run/docker.sock:/var/run/docker.sock  # Docker access
      - ~/.ssh:/root/.ssh:ro  # SSH keys for fleet access
    restart: unless-stopped
    network_mode: host  # Use host network to access Prometheus/Loki/PostgreSQL

# Ensure PostgreSQL is running and accessible before starting CFOperator
