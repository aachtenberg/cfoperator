<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CFOperator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'SF Mono', 'Monaco', 'Inconsolata', 'Fira Code', 'Droid Sans Mono', monospace;
            background: #1e1e1e;
            color: #d4d4d4;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: #252526;
            padding: 12px 20px;
            border-bottom: 1px solid #3e3e42;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 16px;
            font-weight: 600;
            color: #4ec9b0;
        }

        .settings-panel {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .settings-panel label {
            font-size: 12px;
            color: #858585;
        }

        .settings-panel select {
            background: #3c3c3c;
            color: #d4d4d4;
            border: 1px solid #3e3e42;
            padding: 4px 8px;
            border-radius: 3px;
            font-family: inherit;
            font-size: 12px;
        }

        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4ec9b0;
            display: inline-block;
            margin-right: 6px;
        }

        .status-indicator.disconnected {
            background: #f48771;
        }

        #questions-panel {
            background: #2d2d30;
            border-bottom: 1px solid #3e3e42;
            padding: 12px 20px;
            display: none;
        }

        #questions-panel.active {
            display: block;
        }

        .question-card {
            background: #3c3c3c;
            padding: 12px;
            border-radius: 4px;
            border-left: 3px solid #4ec9b0;
            margin-bottom: 10px;
        }

        .question-card h4 {
            color: #4ec9b0;
            font-size: 12px;
            margin-bottom: 6px;
        }

        .question-card p {
            font-size: 13px;
            margin-bottom: 8px;
        }

        .question-card .context {
            font-size: 11px;
            color: #858585;
            margin-bottom: 10px;
        }

        .answer-input {
            display: flex;
            gap: 8px;
        }

        .answer-input input {
            flex: 1;
            background: #2d2d30;
            border: 1px solid #3e3e42;
            color: #d4d4d4;
            padding: 6px 10px;
            border-radius: 3px;
            font-family: inherit;
            font-size: 12px;
        }

        .answer-input button {
            background: #0e639c;
            color: #fff;
            border: none;
            padding: 6px 16px;
            border-radius: 3px;
            cursor: pointer;
            font-family: inherit;
            font-size: 12px;
        }

        .answer-input button:hover {
            background: #1177bb;
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .message {
            margin-bottom: 16px;
            line-height: 1.6;
        }

        .message-header {
            font-size: 12px;
            color: #858585;
            margin-bottom: 4px;
        }

        .message.user .message-header {
            color: #4ec9b0;
        }

        .message.agent .message-header {
            color: #569cd6;
        }

        .message.tool .message-header {
            color: #ce9178;
        }

        .message-content {
            font-size: 13px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .tool-call {
            background: #2d2d30;
            padding: 8px 12px;
            border-radius: 3px;
            border-left: 3px solid #ce9178;
            font-size: 12px;
            margin: 6px 0;
        }

        .tool-name {
            color: #ce9178;
            font-weight: 600;
        }

        #input-area {
            background: #252526;
            border-top: 1px solid #3e3e42;
            padding: 16px 20px;
            display: flex;
            gap: 10px;
        }

        #message-input {
            flex: 1;
            background: #3c3c3c;
            border: 1px solid #3e3e42;
            color: #d4d4d4;
            padding: 10px 14px;
            border-radius: 4px;
            font-family: inherit;
            font-size: 13px;
            resize: none;
        }

        #message-input:focus {
            outline: none;
            border-color: #0e639c;
        }

        #send-button {
            background: #0e639c;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
            font-weight: 500;
        }

        #send-button:hover {
            background: #1177bb;
        }

        #send-button:disabled {
            background: #3e3e42;
            cursor: not-allowed;
        }

        .links-section {
            margin-top: 20px;
            padding: 16px 20px;
            background: #252526;
            border-top: 1px solid #3e3e42;
        }

        .links-section h3 {
            font-size: 13px;
            color: #858585;
            margin-bottom: 10px;
        }

        .links-section ul {
            list-style: none;
        }

        .links-section li {
            margin-bottom: 6px;
        }

        .links-section a {
            color: #4ec9b0;
            text-decoration: none;
            font-size: 12px;
        }

        .links-section a:hover {
            text-decoration: underline;
        }

        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #1e1e1e;
        }

        ::-webkit-scrollbar-thumb {
            background: #424242;
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #4e4e4e;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <span class="status-indicator" id="connection-status"></span>
            CFOperator
        </div>
        <div class="settings-panel">
            <label for="llm-backend">LLM Backend:</label>
            <select id="llm-backend">
                <option value="auto">Auto (Fallback)</option>
                <option value="ollama">Ollama (Local)</option>
                <option value="groq">Groq</option>
                <option value="gemini">Gemini</option>
                <option value="anthropic">Claude</option>
            </select>
        </div>
    </header>

    <div id="questions-panel">
        <!-- Pending questions will be populated here -->
    </div>

    <div id="chat-container">
        <div class="message agent">
            <div class="message-header">agent</div>
            <div class="message-content">CFOperator v1.0.5 ready. Ask me about your infrastructure, or use skills:
- /investigate-container [name] - Systematic container investigation
- /why-restart [container] - Analyze why a container restarted
- /compare-hosts - Compare metrics and config across fleet</div>
        </div>
    </div>

    <div id="input-area">
        <textarea id="message-input" rows="1" placeholder="Ask about your homelab..." autofocus></textarea>
        <button id="send-button">Send</button>
    </div>

    <script>
        let ws = null;
        let chatHistory = [];
        let reconnectAttempts = 0;
        const maxReconnectAttempts = 5;

        // Initialize WebSocket connection
        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.hostname}:8083/ws`;

            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                console.log('WebSocket connected');
                document.getElementById('connection-status').classList.remove('disconnected');
                reconnectAttempts = 0;
            };

            ws.onclose = () => {
                console.log('WebSocket disconnected');
                document.getElementById('connection-status').classList.add('disconnected');

                // Attempt reconnection
                if (reconnectAttempts < maxReconnectAttempts) {
                    reconnectAttempts++;
                    setTimeout(connectWebSocket, 2000 * reconnectAttempts);
                }
            };

            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                handleMessage(data);
            };
        }

        function handleMessage(data) {
            if (data.type === 'chat') {
                addMessage('agent', data.text, data.backend, data.model);
            } else if (data.type === 'question') {
                showQuestion(data);
            } else if (data.type === 'tool_call') {
                addToolCall(data.tool_name, data.input);
            } else if (data.type === 'tool_result') {
                addToolResult(data.tool_name, data.result);
            }
        }

        function addMessage(role, text, backend = null, model = null) {
            const container = document.getElementById('chat-container');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;

            let header = role;
            if (backend && model) {
                header += ` (${backend}/${model})`;
            }

            messageDiv.innerHTML = `
                <div class="message-header">${header}</div>
                <div class="message-content">${escapeHtml(text)}</div>
            `;

            container.appendChild(messageDiv);
            container.scrollTop = container.scrollHeight;
        }

        function addToolCall(toolName, input) {
            const container = document.getElementById('chat-container');
            const toolDiv = document.createElement('div');
            toolDiv.className = 'message tool';

            const inputStr = JSON.stringify(input, null, 2);

            toolDiv.innerHTML = `
                <div class="message-header">tool execution</div>
                <div class="tool-call">
                    <span class="tool-name">${toolName}</span>
                    <pre style="margin-top: 6px; font-size: 11px; color: #858585;">${escapeHtml(inputStr)}</pre>
                </div>
            `;

            container.appendChild(toolDiv);
            container.scrollTop = container.scrollHeight;
        }

        function addToolResult(toolName, result) {
            const container = document.getElementById('chat-container');
            const resultDiv = document.createElement('div');
            resultDiv.className = 'message tool';

            const resultStr = typeof result === 'string' ? result : JSON.stringify(result, null, 2);

            resultDiv.innerHTML = `
                <div class="message-header">tool result</div>
                <div class="tool-call">
                    <span class="tool-name">${toolName}</span> → result
                    <pre style="margin-top: 6px; font-size: 11px; color: #858585;">${escapeHtml(resultStr.substring(0, 500))}${resultStr.length > 500 ? '...' : ''}</pre>
                </div>
            `;

            container.appendChild(resultDiv);
            container.scrollTop = container.scrollHeight;
        }

        function showQuestion(data) {
            const panel = document.getElementById('questions-panel');
            panel.classList.add('active');

            const questionCard = document.createElement('div');
            questionCard.className = 'question-card';
            questionCard.innerHTML = `
                <h4>Investigation #${data.investigation_id} - ${data.host_id || 'cfoperator'}</h4>
                <p>${escapeHtml(data.question)}</p>
                ${data.context ? `<div class="context">${escapeHtml(data.context)}</div>` : ''}
                <div class="answer-input">
                    <input type="text" id="answer-${data.id}" placeholder="Your answer...">
                    <button onclick="submitAnswer(${data.id})">Submit</button>
                </div>
            `;

            panel.appendChild(questionCard);
        }

        function submitAnswer(questionId) {
            const input = document.getElementById(`answer-${questionId}`);
            const answer = input.value.trim();

            if (!answer) return;

            ws.send(JSON.stringify({
                type: 'answer',
                question_id: questionId,
                answer: answer
            }));

            // Remove question card
            input.closest('.question-card').remove();

            // Hide panel if no more questions
            if (document.getElementById('questions-panel').children.length === 0) {
                document.getElementById('questions-panel').classList.remove('active');
            }
        }

        function sendMessage() {
            const input = document.getElementById('message-input');
            const message = input.value.trim();

            if (!message) return;

            const backend = document.getElementById('llm-backend').value;

            // Add user message to chat
            addMessage('user', message);
            chatHistory.push({role: 'user', content: message});

            input.value = '';
            input.rows = 1;

            // Disable send button while waiting
            document.getElementById('send-button').disabled = true;

            // Use WebSocket if available, otherwise fall back to HTTP
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: 'chat',
                    message: message,
                    history: chatHistory,
                    backend: backend
                }));
                setTimeout(() => {
                    document.getElementById('send-button').disabled = false;
                }, 1000);
            } else {
                // Fallback to HTTP API
                fetch('/api/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        message: message,
                        history: chatHistory,
                        backend: backend
                    })
                })
                .then(r => r.json())
                .then(data => {
                    addMessage('agent', data.response, data.backend, data.model);
                    chatHistory.push({role: 'assistant', content: data.response});
                    document.getElementById('send-button').disabled = false;
                })
                .catch(err => {
                    console.error('Error:', err);
                    addMessage('agent', `Error: ${err.message}`, 'error', 'none');
                    document.getElementById('send-button').disabled = false;
                });
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Poll for pending questions every 10 seconds
        setInterval(() => {
            fetch('/api/qa')
                .then(r => r.json())
                .then(questions => {
                    questions.forEach(q => {
                        // Only show if not already displayed
                        if (!document.getElementById(`answer-${q.id}`)) {
                            showQuestion(q);
                        }
                    });
                })
                .catch(err => console.error('Error fetching questions:', err));
        }, 10000);

        // Event listeners
        document.getElementById('send-button').addEventListener('click', sendMessage);

        document.getElementById('message-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        document.getElementById('message-input').addEventListener('input', (e) => {
            // Auto-resize textarea
            e.target.rows = 1;
            const rows = Math.min(Math.ceil(e.target.scrollHeight / 24), 6);
            e.target.rows = rows;
        });

        // Initialize connection
        connectWebSocket();
    </script>
</body>
</html>
